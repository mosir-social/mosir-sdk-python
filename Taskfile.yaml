version: '3'

tasks:
  install:
    desc: Install dependencies with uv
    cmds:
      - uv sync

  format:
    desc: Placeholder for formatting tasks
    cmds:
      - uv run python -m compileall src

  clean:
    desc: Remove local build artifacts
    cmds:
      - rm -rf build dist src/*.egg-info .pytest_cache

  codegen:
    desc: Generate operation registry from public.operations.graphql
    cmds:
      - uv run python ./scripts/generate_operation_registry.py
    sources:
      - ./public.operations.graphql
      - ./scripts/generate_operation_registry.py
    generates:
      - ./src/mosir_sdk/_operations.py

  pyright:
    desc: Run pyright type checking
    deps: [codegen]
    cmds:
      - uv run pyright

  test:
    desc: Run pytest
    deps: [codegen]
    cmds:
      - uv run pytest

  build:
    desc: Build wheel and source distribution
    deps: [codegen]
    cmds:
      - task: clean
      - uv build

  package-check:
    desc: Validate package metadata and distribution rendering
    deps: [build]
    cmds:
      - uvx twine check dist/*

  check:
    desc: Run project checks
    deps: [codegen]
    cmds:
      - uv run pyright
      - uv run pytest
      - task: package-check

  smoke:
    desc: Run a small live API smoke check
    cmds:
      - uv run python ./scripts/smoke.py
