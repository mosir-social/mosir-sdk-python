version: '3'

tasks:
  install:
    desc: Install dependencies with uv
    cmds:
      - uv sync

  format:
    desc: Placeholder for formatting tasks
    cmds:
      - uv run python -m compileall src

  install:
    desc: Install dependencies with uv
    cmds:
      - uv sync

  codegen:
    desc: Generate operation registry from public.operations.graphql
    cmds:
      - uv run python ./scripts/generate_operations.py
    sources:
      - ./public.operations.graphql
      - ./scripts/generate_operations.py
    generates:
      - ./src/mosir_sdk/_operations.py

  pyright:
    desc: Run pyright type checking
    deps: [codegen]
    cmds:
      - uv run pyright

  test:
    desc: Run pytest
    deps: [codegen]
    cmds:
      - uv run pytest

  check:
    desc: Run project checks
    deps: [codegen]
    cmds:
      - uv run pyright
      - uv run pytest

  smoke:
    desc: Run a small live API smoke check
    cmds:
      - uv run python ./scripts/smoke.py
